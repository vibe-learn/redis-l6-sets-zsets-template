# Single-node Redis 7 — local infrastructure for testing this homework.
# Поднять:  docker compose up -d   |   Остановить:  docker compose down -v
services:
  redis:
    image: redis:7
    container_name: redis
    ports: ["6379:6379"]
    command: ["redis-server", "--notify-keyspace-events", "Ex", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 10
